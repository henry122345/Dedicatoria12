<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para alguien especial ❤️</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.contenedor{
    text-align:center;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
    width:90%;
    max-width:400px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    font-size:28px;
}

p{
    font-size:18px;
    line-height:1.5;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#mensaje{
    margin-top:20px;
    font-size:20px;
    display:none;
}

/* Corazones */
.corazon{
    position:absolute;
    color:rgba(255,255,255,0.8);
    animation:subir linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="contenedor">
    <h1>❤️ Para alguien especial ❤️</h1>

    <p>
        A veces las mejores historias comienzan con una simple conversación.
        Tal vez apenas nos estamos conociendo, pero me gusta compartir momentos contigo.
    </p>

    <button onclick="mostrarMensaje()">
        Presiona aquí 💌
    </button>

    <div id="mensaje">
        ✨ Me alegra conocerte y espero que podamos seguir creando bonitos momentos. ❤️
    </div>
</div>

<script>
function mostrarMensaje(){
    document.getElementById("mensaje").style.display="block";
}

// Crear corazones
for(let i=0;i<25;i++){
    let corazon=document.createElement("div");
    corazon.innerHTML="❤️";
    corazon.className="corazon";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.fontSize=(15+Math.random()*25)+"px";
    corazon.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(corazon);
}
</script>

</body>
</html>

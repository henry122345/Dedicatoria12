<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gatito Animado Interactivo</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffd1dc 0%, #e8dff5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      user-select: none;
    }

    .card {
      background-color: #ffffff;
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      width: 310px;
    }

    /* Contenedor del Gatito */
    .cat-container {
      width: 200px;
      height: 200px;
      margin: 0 auto 15px;
      background: #fdf6ec;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
      transition: transform 0.2s ease;
    }

    .cat-container:active {
      transform: scale(0.97);
    }

    svg {
      width: 170px;
      height: 170px;
      overflow: visible;
    }

    /* Partes del cuerpo para animar */
    .tail {
      transform-origin: 80px 75px;
      animation: tailWag 3s ease-in-out infinite alternate;
    }

    .head {
      transform-origin: 50px 45px;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .eyes-happy {
      display: none;
    }

    /* ANIMACIONES AL ACARICIAR */
    
    /* 1. Meneo de cola más rápido */
    .purring .tail {
      animation: tailWagFast 0.4s ease-in-out infinite alternate;
    }

    /* 2. Movimiento de cabeza/frotado */
    .purring .head {
      animation: nuzzle 0.6s ease-in-out infinite alternate;
    }

    /* 3. Ojos felizmente cerrados */
    .purring .eyes-open {
      display: none;
    }
    .purring .eyes-happy {
      display: block;
    }

    /* Keyframes de las animaciones */
    @keyframes tailWag {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(12deg); }
    }

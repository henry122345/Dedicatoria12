<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
}

.tarjeta{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

iframe{
    width:100%;
    height:152px;
    border:none;
    border-radius:12px;
    margin:20px 0;
}

button{
    background:white;
    color:#ff4d6d;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:17px;
    cursor:pointer;
}

#mensaje{
    display:none;
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="tarjeta">

<h1>❤️ Para Ti ❤️</h1>

<p>
Hay personas que llegan sin esperarlo... y poco a poco se vuelven especiales. 🌹
</p>

<iframe
src="https://open.spotify.com/embed/track/3oJhbB8LrDTCNj35lwdtxf?utm_source=generator"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
loading="lazy">
</iframe>

<button onclick="mostrar()">
Abrir mi mensaje 💌
</button>

<p id="mensaje">
No sé qué pase en el futuro, pero me gusta conocerte, hablar contigo y compartir pequeños momentos como este. ❤️✨
</p>

</div>

<script>
function mostrar(){
    document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>

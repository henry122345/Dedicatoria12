<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Súper Gatito Animado Kawaii 🐾</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc 0%, #ffecb6 50%, #b5ead7 100%);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      user-select: none;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 35px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
      width: 330px;
      border: 3px solid #ffffff;
      position: relative;
      overflow: hidden;
    }

    /* Contenedor del Gatito */
    .cat-container {
      width: 220px;
      height: 220px;
      margin: 0 auto 15px;
      background: radial-gradient(circle, #ffffff 0%, #fff5f8 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 10px 25px rgba(255, 140, 180, 0.25);
      transition: transform 0.1s ease;
    }

    .cat-container:active {
      transform: scale(0.93);
    }

    svg {
      width: 190px;
      height: 190px;
      overflow: visible;
    }

    /* ================= ANIMACIONES PASIVAS (Respiración y Parpadeo) ================= */
    .body-group {
      animation: breathe 3s ease-in-out infinite alternate;
      transform-origin: 100px 140px;
    }

    @keyframes breathe {
      0% { transform: scale(1); }
      100% { transform: scale(1.03) translateY(-1px); }
    }

    .tail {
      transform-origin: 135px 150px;
      animation: tailWag 2.5s ease-in-out infinite alternate;
    }

    @keyframes tailWag {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(18deg); }
    }

    /* Parpadeo automático */
    .eye-lid {
      animation: blink 4s infinite;
      transform-origin: 75px 98px;
    }
    .eye-lid-right {
      animation: blink 4s infinite;
      transform-origin: 125px 98px;
    }

    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(0); }
      98% { transform: scaleY(1); }
    }

    /* ================= ANIMACIONES ACTIVAS (Al acariciar) ================= */
    .meowing .body-group {
      animation: jumpAndShake 0.4s ease infinite alternate;
    }

    .meowing .tail {
      animation: tailWagFast 0.25s ease-in-out infinite alternate;
    }

    .meowing .head-group {
      animation: headRub 0.4s ease-in-out infinite alternate;
    }

    @keyframes jumpAndShake {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-8px) scale(1.05); }
    }

    @keyframes tailWagFast {
      0% { transform: rotate(-10deg); }
      100% { transform: rotate(25deg); }
    }

    @keyframes headRub {
      0% { transform: rotate(-6deg); }
      100% { transform: rotate(6deg); }
    }

    .head-group {
      transform-origin: 100px 100px;
      transition: transform 0.3s ease;
    }

    .ear-left { transform-origin: 65px 60px; }
    .ear-right { transform-origin: 135px 60px; }

    .meowing .ear-left { animation: earMoveL 0.3s ease infinite alternate; }
    .meowing .ear-right { animation: earMoveR 0.3s ease infinite alternate; }

    @keyframes earMoveL { 0% { transform: rotate(0deg); } 100% { transform: rotate(-10deg); } }
    @keyframes earMoveR { 0% { transform: rotate(0deg); } 100% { transform: rotate(10deg); } }

    .eyes-open { display: block; }
    .eyes-happy { display: none; }
    .blush-happy { display: none; }

    .meowing .eyes-open { display: none; }
    .meowing .eyes-happy { display: block; }
    .meowing .blush-happy { display: block; }

    /* ================= EFECTOS FLOTANTES ================= */
    .floating-item {
      position: absolute;
      font-weight: bold;
      pointer-events: none;
      animation: floatUpAndFade 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 10;
    }

    @keyframes floatUpAndFade {
      0% { opacity: 0; transform: translateY(10px) scale(0.4) rotate(0deg); }
      50% { opacity: 1; transform: translateY(-30px) scale(1.3) rotate(10deg); }
      100% { opacity: 0; transform: translateY(-65px) scale(1) rotate(-10deg); }
    }

    h2 {
      color: #ff5e7e;
      margin: 8px 0 4px;
      font-size: 1.7rem;
    }

    p {
      color: #666;
      font-size: 0.92rem;
      margin-bottom: 22px;
    }

    .btn-pet {
      background: linear-gradient(135deg, #ff6b8b 0%, #ff8e53 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 107, 139, 0.4);
      transition: all 0.2s ease;
    }

    .btn-pet:hover {
      box-shadow: 0 12px 25px rgba(255, 107, 139, 0.6);
      transform: translateY(-3px);
    }

    .btn-pet:active {
      transform: translateY(1px);
    }

    .counter {
      margin-top: 18px;
      font-size: 1rem;
      font-weight: 600;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="cat-container" id="catBox" onclick="acariciarGato(event)">
      
      <!-- Avatar de Gatito Súper Animado SVG -->
      <svg viewBox="0 0 200 200" id="catSvg">
        <!-- Sombra sutil -->
        <ellipse cx="100" cy="178" rx="50" ry="8" fill="rgba(0,0,0,0.06)" />

        <!-- GRUPO CON RESPIRACIÓN Y MOVIMIENTO -->
        <g class="body-group">
          <!-- Cola esponjosa -->
          <path class="tail" d="M 135 150 C 175 140 180 85 155 75 C 145 70 138 82 148 92 C 162 108 145 138 130 142" fill="#ffb07c" />

          <!-- Cuerpo -->
          <ellipse cx="100" cy="142" rx="42" ry="32" fill="#ffd8b8" />
          <ellipse cx="100" cy="144" rx="28" ry="22" fill="#ffffff" /> <!-- Pechito blanco -->

          <!-- Patitas delanteras -->
          <ellipse cx="80" cy="170" rx="10" ry="8" fill="#ffffff" />
          <ellipse cx="120" cy="170" rx="10" ry="8" fill="#ffffff" />
          <path d="M 76 170 Q 80 174 84 170" stroke="#ffb07c" stroke-width="1.5" fill="none" />
          <path d="M 116 170 Q 120 174 124 170" stroke="#ffb07c" stroke-width="1.5" fill="none" />

          <!-- GRUPO CABEZA -->
          <g class="head-group">
            <!-- Orejas -->
            <g class="ear-left">
              <path d="M 50 85 L 33 32 Q 63 42 75 70 Z" fill="#ffb07c" />
              <path d="M 53 80 L 40 40 Q 61 48 70 70 Z" fill="#ff9ebb" />
            </g>
            <g class="ear-right">
              <path d="M 150 85 L 167 32 Q 137 42 125 70 Z" fill="#ffb07c" />
              <path d="M 147 80 L 160 40 Q 139 48 130 70 Z" fill="#ff9ebb" />
            </g>

            <!-- Cabeza -->
            <ellipse cx="100" cy="100" rx="52" ry="44" fill="#ffd8b8" />

            <!-- Mejillas -->
            <ellipse cx="68" cy="112" rx="16" ry="12" fill="#ffffff" opacity="0.7" />
            <ellipse cx="132" cy="112" rx="16" ry="12" fill="#ffffff" opacity="0.7" />

            <!-- Rubor normal -->
            <ellipse cx="64" cy="108" rx="7" ry="4" fill="#ff8da1" opacity="0.5" />
            <ellipse cx="136" cy="108" rx="7" ry="4" fill="#ff8da1" opacity="0.5" />

            <!-- Rubor feliz -->
            <g class="blush-happy">
              <ellipse cx="64" cy="108" rx="10" ry="5" fill="#ff3366" opacity="0.8" />
              <ellipse cx="136" cy="108" rx="10" ry="5" fill="#ff3366" opacity="0.8" />
            </g>

            <!-- Ojos Abiertos -->
            <g class="eyes-open">
              <circle cx="75" cy="98" r="8" fill="#2d221e" />
              <circle cx="125" cy="98" r="8" fill="#2d221e" />
              <circle cx="72" cy="95" r="3" fill="#ffffff" />
              <circle cx="122" cy="95" r="3" fill="#ffffff" />
              <circle cx="77" cy="100" r="1.5" fill="#ffffff" />
              <circle cx="127" cy="100" r="1.5" fill="#ffffff" />
            </g>

            <!-- Ojos Felices Cerrados -->
            <g class="eyes-happy">
              <path d="M 66 98 Q 75 88 84 98" stroke="#2d221e" stroke-width="3.5" stroke-linecap="round" fill="none" />
              <path d="M 116 98 Q 125 88 134 98" stroke="#2d221e" stroke-width="3.5" stroke-linecap="round" fill="none" />
            </g>

            <!-- Nariz y Boca -->
            <polygon points="97,105 103,105 100,108" fill="#ff5e7e" />
            <path d="M 92 111 Q 96 117 100 112 Q 104 117 108 111" stroke="#2d221e" stroke-width="2" stroke-linecap="round" fill="none" />

            <!-- Bigotes -->
            <line x1="42" y1="102" x2="20" y2="98" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
            <line x1="40" y1="110" x2="18" y2="112" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
            <line x1="158" y1="102" x2="180" y2="98" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
            <line x1="160" y1="110" x2="182" y2="112" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
          </g>
        </g>
      </svg>

    </div>

    <h2>Michi Feliz 🌸</h2>
    <p>¡Toca el botón o al gatito para escuchar su miau!</p>

    <button class="btn-pet" onclick="acariciarGato(event)">¡Acariciar! 🐾</button>
    <div class="counter">Miaus de amor: <span id="count">0</span></div>
  </div>

  <script>
    let caricias = 0;
    let audioCtx = null;
    let timerGato = null;

    // Sintetizador avanzado de sonido "Miau"
    function hacerMiau() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'triangle';
      const now = audioCtx.currentTime;

      // Curva perfecta para un "Mii-aa-uu" tierno
      osc.frequency.setValueAtTime(380, now);
      osc.frequency.exponentialRampToValueAtTime(720, now + 0.12);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.45);

      gain.gain.setValueAtTime(0.01, now);
      gain.gain.linearRampToValueAtTime(0.2, now + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.55);
    }

    function acariciarGato(e) {
      caricias++;
      document.getElementById('count').textContent = caricias;

      // Reproducir sonido
      hacerMiau();

      // Activar animaciones intensas
      const catBox = document.getElementById('catBox');
      catBox.classList.add('meowing');

      // Crear efectos visuales múltiples (Miaus, corazones y estrellas)
      crearEfectosFlotantes(e);

      // Reiniciar el temporizador para apagar la animación de acariciado
      clearTimeout(timerGato);
      timerGato = setTimeout(() => {
        catBox.classList.remove('meowing');
      }, 750);
    }

    function crearEfectosFlotantes(e) {
      const catBox = document.getElementById('catBox');
      const rect = catBox.getBoundingClientRect();
      
      // Coordenadas base del toque o centro
      const x = e.clientX ? (e.clientX - rect.left) : (rect.width / 2);
      const y = e.clientY ? (e.clientY - rect.top) : (rect.height / 3);

      // Generar 2 elementos flotantes al mismo tiempo por cada clic
      const simbolos = ['¡Miau! 💖', '✨', '🐾', '💕 Miau!', '🌸', '⭐'];
      
      for (let i = 0; i < 2; i++) {
        const item = document.createElement('div');
        item.className = 'floating-item';
        item.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
        item.style.color = i === 0 ? '#ff3366' : '#ff9900';
        item.style.fontSize = `${Math.floor(Math.random() * 8) + 16}px`;

        // Desplazamiento aleatorio pequeño para que no queden encimados
        const offsetX = (Math.random() - 0.5) * 50;
        const offsetY = (Math.random() - 0.5) * 30;

        item.style.left = `${x + offsetX}px`;
        item.style.top = `${y + offsetY}px`;

        catBox.appendChild(item);

        setTimeout(() => item.remove(), 900);
      }
    }
  </script>

</body>
</html>

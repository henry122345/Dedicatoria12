<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gatito Animado Kawaii</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #ffeef8 0%, #e0f2fe 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      user-select: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 35px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
      width: 320px;
      border: 2px solid #ffffff;
    }

    /* Contenedor del Gatito */
    .cat-container {
      width: 220px;
      height: 220px;
      margin: 0 auto 20px;
      background: radial-gradient(circle, #ffffff 0%, #fff0f5 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 10px 25px rgba(255, 140, 180, 0.2);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cat-container:hover {
      transform: scale(1.03);
    }

    .cat-container:active {
      transform: scale(0.95);
    }

    svg {
      width: 190px;
      height: 190px;
      overflow: visible;
    }

    /* PARTES ANIMADAS */
    .tail {
      transform-origin: 135px 155px;
      animation: wag 2.5s ease-in-out infinite alternate;
    }

    .head-group {
      transform-origin: 100px 105px;
      transition: transform 0.3s ease;
    }

    .ear-left {
      transform-origin: 65px 60px;
    }

    .ear-right {
      transform-origin: 135px 60px;
    }

    .eyes-happy, .blush-happy {
      display: none;
    }

    /* ESTADO AL ACARICIAR */
    .meowing .head-group {
      animation: petHead 0.5s ease-in-out infinite alternate;
    }

    .meowing .ear-left {
      animation: earTwitchLeft 0.3s ease-in-out infinite alternate;
    }

    .meowing .ear-right {
      animation: earTwitchRight 0.3s ease-in-out infinite alternate;
    }

    .meowing .tail {
      animation: wagFast 0.3s ease-in-out infinite alternate;
    }

    .meowing .eyes-open { display: none; }
    .meowing .eyes-happy { display: block; }
    .meowing .blush-happy { display: block; }

    /* KEYFRAMES */
    @keyframes wag {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(15deg); }
    }

    @keyframes wagFast {
      0% { transform: rotate(-8deg); }
      100% { transform: rotate(22deg); }
    }

    @keyframes petHead {
      0% { transform: rotate(-5deg) translateY(3px); }
      100% { transform: rotate(5deg) translateY(-2px); }
    }

    @keyframes earTwitchLeft {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-8deg); }
    }

    @keyframes earTwitchRight {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(8deg); }
    }

    /* EFECTO DE CORAZONES Y TEXTO "MIAU" */
    .pop-effect {
      position: absolute;
      font-weight: bold;
      pointer-events: none;
      animation: floatUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      50% { opacity: 1; transform: translateY(-25px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-50px) scale(1); }
    }

    h2 {
      color: #ff6b8b;
      margin: 5px 0;
      font-size: 1.6rem;
    }

    p {
      color: #888;
      font-size: 0.92rem;
      margin-bottom: 20px;
    }

    .btn-pet {
      background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 117, 140, 0.4);
      transition: all 0.2s ease;
    }

    .btn-pet:hover {
      box-shadow: 0 10px 25px rgba(255, 117, 140, 0.6);
      transform: translateY(-2px);
    }

    .btn-pet:active {
      transform: translateY(1px);
    }

    .counter {
      margin-top: 18px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="cat-container" id="catBox" onclick="acariciarGato(event)">
      
      <!-- Avatar Ilustrado SVG -->
      <svg viewBox="0 0 200 200" id="catSvg">
        <!-- Sombra en el suelo -->
        <ellipse cx="100" cy="175" rx="55" ry="10" fill="#eae0e8" />

        <!-- Cola esponjosa -->
        <path class="tail" d="M 135 150 C 170 140 175 90 155 80 C 145 75 140 85 148 95 C 160 110 145 135 130 142" fill="#ffb07c" />

        <!-- Cuerpo del gatito -->
        <ellipse cx="100" cy="140" rx="42" ry="32" fill="#ffd8b8" />
        <ellipse cx="100" cy="142" rx="28" ry="22" fill="#ffffff" /> <!-- Pechito blanco -->

        <!-- Patitas delanteras -->
        <ellipse cx="80" cy="168" rx="10" ry="8" fill="#ffffff" />
        <ellipse cx="120" cy="168" rx="10" ry="8" fill="#ffffff" />
        <path d="M 76 168 Q 80 172 84 168" stroke="#ffb07c" stroke-width="1.5" fill="none" />
        <path d="M 116 168 Q 120 172 124 168" stroke="#ffb07c" stroke-width="1.5" fill="none" />

        <!-- GRUPO CABEZA (para animar junta) -->
        <g class="head-group">
          <!-- Orejas -->
          <g class="ear-left">
            <path d="M 50 85 L 35 35 Q 65 45 75 70 Z" fill="#ffb07c" />
            <path d="M 53 80 L 42 43 Q 63 51 70 70 Z" fill="#ff9ebb" />
          </g>
          <g class="ear-right">
            <path d="M 150 85 L 165 35 Q 135 45 125 70 Z" fill="#ffb07c" />
            <path d="M 147 80 L 158 43 Q 137 51 130 70 Z" fill="#ff9ebb" />
          </g>

          <!-- Cabeza -->
          <ellipse cx="100" cy="100" rx="52" ry="44" fill="#ffd8b8" />

          <!-- Cachetitos / Mejillas claras -->
          <ellipse cx="70" cy="112" rx="16" ry="12" fill="#ffffff" opacity="0.6" />
          <ellipse cx="130" cy="112" rx="16" ry="12" fill="#ffffff" opacity="0.6" />

          <!-- Rubor normal -->
          <ellipse cx="65" cy="108" rx="7" ry="4" fill="#ff8da1" opacity="0.5" />
          <ellipse cx="135" cy="108" rx="7" ry="4" fill="#ff8da1" opacity="0.5" />

          <!-- Rubor feliz (extra al acariciar) -->
          <g class="blush-happy">
            <ellipse cx="65" cy="108" rx="9" ry="5" fill="#ff4d73" opacity="0.7" />
            <ellipse cx="135" cy="108" rx="9" ry="5" fill="#ff4d73" opacity="0.7" />
          </g>

          <!-- Ojos abiertos (Kawaii con destellos) -->
          <g class="eyes-open">
            <circle cx="75" cy="98" r="8" fill="#2d221e" />
            <circle cx="125" cy="98" r="8" fill="#2d221e" />
            <circle cx="72" cy="95" r="3" fill="#ffffff" />
            <circle cx="122" cy="95" r="3" fill="#ffffff" />
            <circle cx="77" cy="100" r="1.5" fill="#ffffff" />
            <circle cx="127" cy="100" r="1.5" fill="#ffffff" />
          </g>

          <!-- Ojos felices cerrados (al acariciar) -->
          <g class="eyes-happy">
            <path d="M 66 98 Q 75 88 84 98" stroke="#2d221e" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 116 98 Q 125 88 134 98" stroke="#2d221e" stroke-width="3.5" stroke-linecap="round" fill="none" />
          </g>

          <!-- Nariz pequeña -->
          <polygon points="97,105 103,105 100,108" fill="#ff6b8b" />

          <!-- Boca tierno (estilo 'w') -->
          <path d="M 93 111 Q 96.5 116 100 111 Q 103.5 116 107 111" stroke="#2d221e" stroke-width="2" stroke-linecap="round" fill="none" />

          <!-- Bigotes finos -->
          <line x1="42" y1="102" x2="22" y2="99" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
          <line x1="40" y1="110" x2="20" y2="112" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
          <line x1="158" y1="102" x2="178" y2="99" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
          <line x1="160" y1="110" x2="180" y2="112" stroke="#ffb07c" stroke-width="2" stroke-linecap="round" />
        </g>
      </svg>

    </div>

    <h2>Michi Kawaii 🐾</h2>
    <p>Toca al gatito para que te diga <b>¡Miau!</b></p>

    <button class="btn-pet" onclick="acariciarGato(event)">¡Acariciar! ✨</button>
    <div class="counter">Miaus recibidos: <span id="count">0</span></div>
  </div>

  <script>
    let caricias = 0;
    let audioCtx = null;
    let timerGato = null;

    // SINTETIZADOR DE SONIDO "MIAU" (Web Audio API)
    function hacerMiau() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'triangle'; // Tono suave
      const now = audioCtx.currentTime;

      // Modulación de frecuencia para simular "Miii-aa-uu"
      osc.frequency.setValueAtTime(400, now); // Empieza agudito (Mii)
      osc.frequency.exponentialRampToValueAtTime(750, now + 0.15); // Sube tono (Aa)
      osc.frequency.exponentialRampToValueAtTime(320, now + 0.45); // Cae suavemente (Uu)

      // Control del volumen (suavizar entrada y salida)
      gain.gain.setValueAtTime(0.01, now);
      gain.gain.linearRampToValueAtTime(0.25, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.48);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.5);
    }

    function acariciarGato(e) {
      caricias++;
      document.getElementById('count').textContent = caricias;

      // Reproducir sonido MIAU
      hacerMiau();

      // Animaciones visuales
      const catBox = document.getElementById('catBox');
      catBox.classList.add('meowing');

      // Crear efectos flotantes (Texto "¡Miau!" + Corazones)
      crearEfectoFlotante(e);

      clearTimeout(timerGato);
      timerGato = setTimeout(() => {
        catBox.classList.remove('meowing');
      }, 700);
    }

    function crearEfectoFlotante(e) {
      const catBox = document.getElementById('catBox');
      const pop = document.createElement('div');
      pop.className = 'pop-effect';
      
      // Alterna entre decir ¡Miau! y poner corazones
      const elementos = ['¡Miau! 💕', '💖', '✨ ¡Miau!', '🐾', '🌸'];
      pop.textContent = elementos[Math.floor(Math.random() * elementos.length)];
      pop.style.color = '#ff4d73';

      const rect = catBox.getBoundingClientRect();
      const x = e.clientX ? (e.clientX - rect.left) : (rect.width / 2);
      const y = e.clientY ? (e.clientY - rect.top) : (rect.height / 3);

      pop.style.left = `${x - 20}px`;
      pop.style.top = `${y - 10}px`;

      catBox.appendChild(pop);

      setTimeout(() => pop.remove(), 800);
    }
  </script>

</body>
</html>
